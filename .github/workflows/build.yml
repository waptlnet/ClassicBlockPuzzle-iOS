name: Build iOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # е…Ѓи®ёж‰‹еЉЁи§¦еЏ‘

jobs:
  build:
    name: Build BlockBlastPuzzle
    runs-on: macos-15   # жњЂж–?macOS + Xcode 16

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available schemes
        run: xcodebuild -project BlockBlastPuzzle.xcodeproj -list

      - name: Build (Release)
        run: |
          xcodebuild \
            -project BlockBlastPuzzle.xcodeproj \
            -scheme BlockBlastPuzzle \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockBlastPuzzle-App
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphonesimulator/*.app
          retention-days: 30
